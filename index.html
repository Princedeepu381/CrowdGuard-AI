<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdGuard AI - IoT Security</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            border: 1px solid #30363d;
            background: #161b22;
            padding: 15px;
            border-radius: 6px;
            width: 50%;
        }

        #chat-box {
            height: 250px;
            overflow-y: auto;
            background: #010409;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .msg-user {
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .msg-ai {
            color: #3fb950;
            margin-bottom: 15px;
        }

        input {
            width: calc(100% - 90px);
            padding: 10px;
            background: #010409;
            color: white;
            border: 1px solid #30363d;
            border-radius: 4px;
        }

        button {
            width: 80px;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #2ea043;
        }

        .alert {
            color: #f85149;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>CrowdGuard AI // Live Event Terminal</h2>

    <div class="dashboard">
        <div class="panel">
            <h3>IoT Sensor Feed</h3>
            <div id="sensor-data">Waiting for stream...</div>
        </div>
        <div class="panel">
            <h3>User Context</h3>
            <div>Location: <span style="color:#e3b341;">Gate_A</span></div>
            <div>Clearance: <span style="color:#e3b341;">General Admission</span></div>
        </div>
    </div>

    <div class="panel" style="width: 100%; box-sizing: border-box;">
        <h3>AI Concierge</h3>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Enter routing query or issue...">
        <button id="send-btn">Send</button>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
